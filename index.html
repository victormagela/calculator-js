<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/script.js" defer></script>
</head>
<body>
    <input id="display" type="text" readonly placeholder="0">
    
    <div id="buttons">
        <button>Clear</button>
        <button>&#9003;</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>+</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>x</button>
        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button>&divide;</button>
    </div>
</body>
</html>
